replicaCount: 1
autoscaling:
  enabled: false

image:
  repository: registry.gitlab.com/esab/abw/infra-and-test/nix-stored
  tag: 1.0.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nix-stored.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

persistence:
  enabled: true
  existingClaim: ""
  mountPath: "/var/lib/nixStored"

env:
  - name: NIX_STORED_PATH
    value: /var/lib/nixStored
