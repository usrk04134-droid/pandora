# Template job for Nix based build and run test.

spec:
  inputs:
    tags:
      description: 'The runner selection tags'
      type: array
      default:
        - adaptio-k8-2
    job-name:
      description: 'The name of the job'
      type: string
      default: 'run-test'
    job-timeout:
      description: 'The timeout of the job'
      type: string
      default: '90 minutes'
    job-rules:
      description: 'The list of rules: for the job'
      type: array
      default:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          interruptible: true
    job-dependencies:
      description: 'The list of dependencies for the job'
      type: array
      default: []
    nix-attribute:
      description: 'The nix target attribute to build'
      type: string
      default: .#
    post-build-hook:
      description: 'If true, the post-build hook will be executed'
      type: string
      default: 'true'
    verbose:
      description: 'If set verbose build output enabled'
      type: boolean
      default: false
    test-targets:
      description: 'The test targets to run after build'
      type: array
      default: []
    test-output:
      description: 'The test output files, one per test target'
      type: array
      default:
        - 'test-output.xml'
    test-log:
      description: 'The test log file to collect stdout/stderr'
      type: string
      default: 'test.log'
    test-suite:
      description: 'The test suite names, one per test target'
      type: array
      default:
        - 'Unit Test'

---
include:
  - local: '/.gitlab-ci/k8-runner-defaults.yml'
    inputs:
      post-build-hook: $[[ inputs.post-build-hook ]]
      job-name-suffix: $[[ inputs.job-name ]]

'$[[ inputs.job-name ]]':
  extends: '.k8-adaptio-$[[ inputs.job-name ]]'
  tags: $[[ inputs.tags ]]
  stage: test
  timeout: $[[ inputs.job-timeout ]]
  dependencies: $[[ inputs.job-dependencies ]]
  rules: $[[ inputs.job-rules ]]
  artifacts:
    when: always
    paths:
      - $[[ inputs.test-output ]]
      - $[[ inputs.test-log ]]
    reports:
      junit: $[[ inputs.test-output ]]
    expire_in: 2 weeks
  script:
    - T_SCRIPT_START=$(date +%s)
    - !reference [.fetch-scripts, script]
    - T_FETCH_END=$(date +%s)
    - VERBOSE=""
    - if $[[ inputs.verbose ]]; then VERBOSE="-vv"; fi

    - source $GITLAB_SHARED_FUNCS
    - |
      eval "$(declare -f section_start | sed '1s/section_start/_orig_section_start/')"
      eval "$(declare -f section_end   | sed '1s/section_end/_orig_section_end/')"
      declare -A _T_START _T_DUR _T_LABEL
      declare -a _T_ORDER
      section_start() {
        _T_START[$1]=$(date +%s)
        _T_LABEL[$1]="${2:-$1}"
        _T_ORDER+=("$1")
        _orig_section_start "$@"
      }
      section_end() {
        _T_DUR[$1]=$(( $(date +%s) - ${_T_START[$1]:-$(date +%s)} ))
        _orig_section_end "$@"
      }

    - section_start fetch_cache "Test-Nix; fetch nix dependencies" true
    # Fetch from cache separately from building, to get individual timing measurements for each
    - section_start dry_run "Test-Nix; dry-run" true
    - nix build $[[ inputs.nix-attribute ]] --dry-run
    - section_end dry_run
    # Set remote and local builders to 0 to force build step to fail / be skipped
    - >
      nix build $[[ inputs.nix-attribute ]]
      --print-out-paths
      --log-format bar-with-logs
      $VERBOSE
      --option max-jobs 0
      --option builders ''
      || true
    - echo 'The error "Unable to start any build; ..." above is expected and OK!'
    - section_end fetch_cache

    - section_start build "Test-Nix; build" true
    - >
      nix build $[[ inputs.nix-attribute ]]
      --print-out-paths
      --log-format bar-with-logs
      $VERBOSE
    - section_end build

    - TEST_LOG=${CI_PROJECT_DIR}/$[[ inputs.test-log ]]
    - EXIT_CODE=0
    - set -o pipefail
    - T_TESTS_START=$(date +%s)
    - |
      parse_array() { echo "$1" | tr -d '[]"' | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
      readarray -t TEST_TARGETS < <(parse_array '$[[ inputs.test-targets ]]')
      readarray -t TEST_OUTPUTS < <(parse_array '$[[ inputs.test-output ]]')
      readarray -t TEST_SUITES  < <(parse_array '$[[ inputs.test-suite ]]')
      for i in "${!TEST_TARGETS[@]}"; do
        target="${TEST_TARGETS[$i]}"
        output="${CI_PROJECT_DIR}/${TEST_OUTPUTS[$i]}"
        [ -z "${target}" ] && continue
        section_start "test_${target}" "${TEST_SUITES[$i]}" true
        ./result/bin/${target} \
          --doctest-no-colors \
          --doctest-minimal \
          --doctest-reporters=junit \
          --doctest-out=${output} \
          2>&1 | tee -a ${TEST_LOG} || EXIT_CODE=$?
        sed -i -n '/<testsuites>/,/<\/testsuites>/p' ${output}
        sed -i "s|<testsuite name=\"[^\"]*\"|<testsuite name=\"${TEST_SUITES[$i]}\"|g" ${output}
        section_end "test_${target}"
      done

    - T_TESTS_END=$(date +%s)
    - section_start export_testrail "Export results to TestRail" true
    - |
      readarray -t TEST_TARGETS < <(parse_array '$[[ inputs.test-targets ]]')
      readarray -t TEST_OUTPUTS < <(parse_array '$[[ inputs.test-output ]]')
      readarray -t TEST_SUITES  < <(parse_array '$[[ inputs.test-suite ]]')
      if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "TAG detected - exporting results to TestRail"
        for i in "${!TEST_TARGETS[@]}"; do
          target="${TEST_TARGETS[$i]}"
          [ -z "${target}" ] && continue
          TESTRAIL_SECTION_NAME="${TEST_SUITES[$i]}" \
            $SCRIPTS_DIR/export-test-result.sh \
              --report ${CI_PROJECT_DIR}/${TEST_OUTPUTS[$i]} \
            || echo "TestRail export failed for ${target}, continuing..."
        done
      else
        echo "Not a tag - skipping TestRail export"
      fi
    - section_end export_testrail
    - T_SCRIPT_END=$(date +%s)

    - section_start timing_summary "Timing Summary" true
    - |
      fmt() { printf "%dm %02ds" $(($1/60)) $(($1%60)); }
      JOB_START=$(date -d "$CI_JOB_STARTED_AT" +%s 2>/dev/null || echo "$T_SCRIPT_START")
      T_NOW=$(date +%s)
      _SKIP="dry_run nix_cache_preparations timing_summary"
      echo "===== TIMING SUMMARY ====="
      printf "%-32s %s\n" "Pod startup:"    "$(fmt $(( T_SCRIPT_START - JOB_START )))"
      printf "%-32s %s\n" "Fetch scripts:"  "$(fmt $(( T_FETCH_END - T_SCRIPT_START )))"
      _tests_shown=false
      for id in "${_T_ORDER[@]}"; do
        [[ " $_SKIP " == *" $id "* ]] && continue
        if [[ "$id" == test_* ]]; then
          if [[ "$_tests_shown" == false ]]; then
            printf "%-32s %s\n" "Tests:" "$(fmt $(( T_TESTS_END - T_TESTS_START )))"
            _tests_shown=true
          fi
          printf "  %-30s %s\n" "${_T_LABEL[$id]}:" "$(fmt ${_T_DUR[$id]:-0})"
          continue
        fi
        printf "%-32s %s\n" "${_T_LABEL[$id]}:" "$(fmt ${_T_DUR[$id]:-0})"
      done
      printf "%-32s %s\n" "Script total:"  "$(fmt $(( T_SCRIPT_END - T_SCRIPT_START )))"
      printf "%-32s %s\n" "Job wall time:" "$(fmt $(( T_NOW - JOB_START )))"
      echo "================================="
    - section_end timing_summary

    - exit $EXIT_CODE
