line-length = 120

[lint]
# Enable Pyflakes (`F`) and all pycodestyle (`E`) codes by default.
# For more, config https://docs.astral.sh/ruff/configuration/
select = ["E", "F"]

[lint.per-file-ignores]
# Ignore unused imports in __init__.py files
"__init__.py" = ["F401"]

# Ignore checks in tests
"test_*.py" = ["E", "F"]
"conftest.py" = ["E", "F"]
